<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Burned Cookies</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <main class="popup">
    <header class="header">
      <img src="icons/icon48.png" alt="" class="logo">
      <div>
        <h1>Burned Cookies</h1>
        <p id="currentDomain" class="muted">Loading current site…</p>
      </div>
    </header>

    <section class="card">
      <h2>Current site</h2>
      <div class="button-row">
        <button id="addExactButton" type="button">Whitelist domain</button>
        <button id="addWildcardButton" type="button">Whitelist wildcard</button>
      </div>
      <p class="hint">Wildcard keeps the base domain and all subdomains.</p>
    </section>

    <section class="card">
      <h2>Privacy cleanup</h2>
      <label class="toggle-row">
        <input type="checkbox" id="clearSiteDataToggle">
        <span>
          <strong>Also clear site data</strong>
          <small>Default on. Removes localStorage, IndexedDB, Cache Storage, service workers, cache, and more for non-whitelisted sites.</small>
        </span>
      </label>
      <button id="cleanNowButton" type="button" class="secondary">Clean now</button>
    </section>

    <section class="card">
      <div class="section-header">
        <h2>Matching whitelist</h2>
        <a href="whitelist.html" target="_blank" rel="noreferrer">Manage all</a>
      </div>
      <ul id="matchingList" class="list"></ul>
      <p id="emptyMatching" class="muted hidden">No whitelist entries match this tab.</p>
    </section>

    <section class="card">
      <h2>Import / export</h2>
      <div class="button-row">
        <button id="exportButton" type="button" class="secondary">Export JSON</button>
        <label class="file-button secondary">
          Import JSON
          <input id="importInput" type="file" accept="application/json,.json">
        </label>
      </div>
    </section>

    <p id="status" class="status" role="status"></p>
  </main>

  <script src="popup.js"></script>
</body>
</html>
